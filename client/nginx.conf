server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This line is crucial for React apps with routing:
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests if you don't want to use the Ingress for local testing
    # location /api/ {
    #     proxy_pass http://backend-service:5000/;
    # }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}