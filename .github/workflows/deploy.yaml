name: Build & Push Multi-Ride + Update K8s Manifests

on:
  push:
    branches: ["main"]
    paths:
      - "client/**"
      - "server/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          build-args: |
            VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/multi-ride-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/multi-ride-frontend:latest

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/multi-ride-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/multi-ride-backend:latest

  update-manifests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout k-apps repo
        uses: actions/checkout@v4
        with:
          repository: NaveenSasalu/k-apps
          token: ${{ secrets.K_APPS_TOKEN }}

      - name: Update image tags in deployment manifests
        run: |
          sed -i "s#multi-ride-frontend:.*#multi-ride-frontend:${{ github.sha }}#g" multi-ride-maps/deploy-fe.yaml
          sed -i "s#multi-ride-backend:.*#multi-ride-backend:${{ github.sha }}#g" multi-ride-maps/deploy-be.yaml

      - name: Commit updated manifests
        uses: EndBug/add-and-commit@v9
        with:
          add: "multi-ride-maps/deploy-fe.yaml multi-ride-maps/deploy-be.yaml"
          message: "ci: update multi-ride images to ${{ github.sha }}"
